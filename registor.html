<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form login and password</title>
    <link rel="stylesheet" href="registor.css">
   <script src="registor.js" defer></script>
</head>
<body>
    <header class="header">
        <div>
            <p class="swerwes">Swerwes</p>
        </div>
        <nav class="menu">
            <a id="homeBtn" class="head" href="index.html">Главная</a>
            <a id="gamesBtn" class="head" href="about.html">О моем проекте</a>
        <a id="libraryBtn" class="head" href="library.html">Библиотека</a>
        </nav>
        <div class="search">
            <input class="moron" id="search" placeholder="Поиск">
        </div>
        <div class="conteiner">
            <a href="registor.html">
            <img class="imgLogo" src="https://static.vecteezy.com/system/resources/previews/019/879/186/original/user-icon-on-transparent-background-free-png.png" alt="logo">
        </a>
        </div>
    </header>


    <div id="authForm">
    <div class="center-box">
        <div class="wrapper">

            <h1 id="formTitle">Login</h1>

            <div class="input-box">
                <input id="username" type="text" placeholder="Username">
            </div>

            <div class="input-box">
                <input id="password" type="password" placeholder="Password">
            </div>

            <button class="btn" id="mainBtn">Login</button>

            <p id="switchText">
                Нет аккаунта?
                <a href="#" id="switchLink">Регистрация</a>
            </p>

        </div>
    </div>
</div>


 <div class="center-box">
    <div class="wrapper">
<div id="profile" style="display:none;">
    <img id="avatar" style="width:100px;height:100px;border-radius:50%;">

    <input type="file" id="fileInput">

    <h2 id="welcome"></h2>

    <h3>Достижения</h3>
    <ul>
        <li>🎮 Первый вход</li>
        <li>🔥 Создал аккаунт</li>
        <li>💻 Разработчик</li>
    </ul>

    <button id="logoutBtn">Выйти</button>
</div>
</div>
</div>
    
</body>
